# Safety-net CI: proves the tree builds and passes off this machine. The full
# local pipeline (fuzz, profiling, dogfood, publish) stays in cicd/cicd.bash.
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: source/go.sum
      - name: git identity
        # Some tests shell out to `git commit` (autosync); a bare runner has no
        # identity, so give it one. Harmless on a dev machine that already does.
        run: |
          git config --global user.email "ci@nano-git-db.local"
          git config --global user.name "nano-git-db CI"
      - name: gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -n "$unformatted" ]; then echo "needs gofmt:"; echo "$unformatted"; exit 1; fi
      - name: vet
        run: go vet -mod=vendor ./...
      - name: test
        run: go test -mod=vendor ./...
      - name: build
        run: go build -mod=vendor ./...
