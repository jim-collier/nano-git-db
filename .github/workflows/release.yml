# Release on merge to main. The source var app.Version is authoritative. This
# GUARDS that the version was incremented (fails the run otherwise), that the
# README version badge agrees with it, then tags v<Version> and hands off to
# goreleaser to cross-build, archive, and publish the Release with checksums.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: source/go.sum
      - name: Guard version and badge
        id: v
        run: |
          version=$(grep -oP 'Version = "\K[^"]+' source/app/app.go | head -1)
          [ -n "$version" ] || { echo "::error::could not read Version from source/app/app.go"; exit 1; }
          tag="v${version}"
          # Increment guard: the version must not already be released, and must be
          # strictly greater than the latest release tag. A merge to main without a
          # bump fails here rather than silently doing nothing.
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::Version ${version} already released (tag ${tag}). Bump app.Version before merging to main."
            exit 1
          fi
          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -n "$latest" ]; then
            top=$(printf '%s\n%s\n' "$latest" "$tag" | sort -V | tail -1)
            if [ "$top" != "$tag" ]; then
              echo "::error::Version ${version} is not greater than the latest release ${latest}. Bump app.Version."
              exit 1
            fi
          fi
          # Badge guard: the README release badge is dynamic (tracks the tag we cut,
          # so it will show ${version}). If the README instead pins a hardcoded
          # version badge, it must match the source version.
          badge=$(grep -oiP 'badge/[Vv]ersion-\K[0-9]+\.[0-9]+\.[0-9]+' README.md 2>/dev/null | head -1 || true)
          if [ -n "$badge" ] && [ "$badge" != "$version" ]; then
            echo "::error::README version badge ${badge} != source version ${version}."
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Tag
        run: |
          git config user.name "nano-git-db"
          git config user.email "release@nano-git-db.local"
          git tag -a "v${{ steps.v.outputs.version }}" -m "v${{ steps.v.outputs.version }}"
          git push origin "v${{ steps.v.outputs.version }}"
      - name: goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Windows single-file .exe installer(s), built from the binaries goreleaser
      # just cross-compiled into dist/ (NSIS runs on Linux, no wine), then attached
      # to the release goreleaser created.
      - name: Windows installers
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          bash cicd/utility/windows-installer.bash "${{ steps.v.outputs.version }}"
          gh release upload "v${{ steps.v.outputs.version }}" dist/*setup.exe --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
