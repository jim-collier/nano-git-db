# CLA gate: every pull request author must sign CLA.md before it can merge.
# Signatures are stored in this repository on the cla-signatures branch, so the
# built-in GITHUB_TOKEN is enough and no extra secret is needed.
# Bump the pinned action tag when a newer release lands.
name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA check
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/jim-collier/nano-git-db/blob/main/CLA.md'
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'
          allowlist: 'jim-collier,dependabot[bot]'
          custom-notsigned-prcomment: 'Thanks for your pull request. Before it can be merged, please sign the [Contributor License Agreement](https://github.com/jim-collier/nano-git-db/blob/main/CLA.md) by posting a comment with exactly this text:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
